<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnet Visualisasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Magnetometer Monitoring</h1>
        
        <div class="row">
            <!-- Card 1: Value Display with Speech -->
            <div class="col-md-6 mb-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h5 class="card-title">Magnetic Field Value</h5>
                    </div>
                    <div class="card-body text-center">
                        <h2 id="magneticValue" class="display-4">0.000000 T</h2>
                        <div class="mt-3">
                            <button id="speakBtn" class="btn btn-success me-2">
                                <i class="bi bi-volume-up"></i> Read Value
                            </button>
                            <button id="toggleAutoSpeak" class="btn btn-outline-primary">
                                <i class="bi bi-megaphone"></i> Auto-Read: OFF
                            </button>
                        </div>
                    </div>
                    <div class="card-footer text-muted">
                        Last updated: <span id="lastUpdate">Never</span>
                    </div>
                </div>
            </div>
            
            <!-- Card 2: Configuration Info -->
            <div class="col-md-6 mb-4">
                <div class="card shadow">
                    <div class="card-header bg-info text-white">
                        <h5 class="card-title">Sensor Configuration</h5>
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item">
                                <strong>Sensor Type:</strong> <span id="sensorType">-</span>
                            </li>
                            <li class="list-group-item">
                                <strong>Analog Pin:</strong> <span id="analogPin">-</span>
                            </li>
                            <li class="list-group-item">
                                <strong>Uptime:</strong> <span id="uptime">-</span> minutes
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Chart Card -->
        <div class="card shadow mb-4">
            <div class="card-header bg-warning text-dark">
                <h5 class="card-title">Magnetic Field History</h5>
            </div>
            <div class="card-body">
                <canvas id="magneticChart" height="300"></canvas>
            </div>
        </div>
        
        <!-- Raw Data Card -->
        <div class="card shadow">
            <div class="card-header bg-secondary text-white">
                <h5 class="card-title">Raw Data</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Magnetic Field (T)</th>
                            </tr>
                        </thead>
                        <tbody id="dataTable">
                            <!-- Data will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
