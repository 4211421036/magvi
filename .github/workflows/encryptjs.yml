name: Encrypt JS → Generate JSON

# Jalankan otomatis di setiap push ke branch main (atau Anda bisa sesuaikan)
on:
  push:
    branches:
      - main

jobs:
  build-and-encrypt:
    name: Build & Encrypt JS File
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Membutuhkan agar kita bisa commit–push kembali hasil JSON
          persist-credentials: true  
          fetch-depth: 0

      # 2) Setup Python (misal versi 3.10)
      - name: Setup Python 3.x
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3) Install dependencies (package laicrypto/pqcrypto)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install laicrypto

      # 4) Jalankan skrip Python untuk enkripsi
      - name: Encrypt hello.js → hello_ciphertext.json
        run: |
          python Crypto/LAI.py

      # 5) Commit & Push file JSON hasil enkripsi kembali ke repo
      - name: Commit and push script.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Cek apakah ada perubahan (hello_ciphertext.json bisa baru atau berubah)
          if git diff --quiet; then
            echo "Tidak ada perubahan pada file JSON, skip commit."
          else
            git add script.json
            git commit -m "chore: update hello_ciphertext.json (auto-generated)"
            git push origin HEAD:main
          fi
